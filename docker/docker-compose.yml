services:
  db:
    image: postgres:15-alpine
    container_name: toir_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    container_name: toir_backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/toir
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../backend:/app
      - /app/node_modules
      - ../frontend:/frontend
    working_dir: /app

  frontend:
    build: ../frontend
    container_name: toir_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data: